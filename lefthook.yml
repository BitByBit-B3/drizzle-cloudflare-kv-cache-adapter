# https://lefthook.dev
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,js,jsonc,json}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: test
      run: bun test
    - name: build
      run: bun run build
